name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # grammar-staleness — fails when the committed Go and TS SAP server-name
  # parsers drift from docs/grammar/sap-server-name.yaml. Hand-fix is
  # `make grammar` (or `go run ./tools/grammar-gen`) followed by committing
  # the regenerated files. On failure, the diff against committed files is
  # printed inline so the dev does not have to re-run the generator
  # locally to see what changed.
  # Plan reference: docs/PLAN-sap-picker-and-import-mcp.md task T-A.2.
  grammar-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify generated parsers match grammar YAML
        run: go run ./tools/grammar-gen/check
      - name: Show diff on failure
        if: failure()
        run: |
          go run ./tools/grammar-gen
          echo "::error::Generated parsers are stale — committed files differ from regeneration."
          git --no-pager diff --stat -- internal/sapname/grammar_gen.go vscode/mcp-gateway-dashboard/src/sap-name-grammar.gen.ts || true
          git --no-pager diff -- internal/sapname/grammar_gen.go vscode/mcp-gateway-dashboard/src/sap-name-grammar.gen.ts || true
          exit 1

  test:
    strategy:
      matrix:
        # T1.5.6: macos-latest added 2026-05-19 — §2.5 cross-platform invariant
        # of PLAN-stabilization requires all three OSes. Race detector still
        # gated to ubuntu-latest below (Windows needs MinGW-w64; macOS has cgo
        # by default but skipped here for parity with the long-standing
        # Linux-only race-detector convention).
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Test with race detector (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...
        # Note: race detector unavailable on Windows without gcc (MinGW-w64).
        # Windows-specific code paths (job_windows.go, config.go atomic write)
        # require manual review at Phase 5.5 GATE.

  smoke-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o mcp-gateway ./cmd/mcp-gateway

      - name: Start daemon
        run: |
          ./mcp-gateway -config testdata/smoke-config.json &
          echo "PID=$!" >> "$GITHUB_ENV"

      - name: Wait for health endpoint
        run: |
          url="http://127.0.0.1:18765/api/v1/health"
          delay_ms=100
          total_ms=0
          max_ms=10000
          while [ "$total_ms" -lt "$max_ms" ]; do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Daemon process $PID died before health endpoint was ready"
              exit 1
            fi
            if curl -sf "$url" > /dev/null 2>&1; then
              echo "Health endpoint ready after ${total_ms}ms"
              exit 0
            fi
            sleep "$(printf '%d.%03d' $((delay_ms / 1000)) $((delay_ms % 1000)))"
            total_ms=$((total_ms + delay_ms))
            delay_ms=$((delay_ms * 2))
            if [ "$delay_ms" -gt 3200 ]; then delay_ms=3200; fi
          done
          echo "Health endpoint not ready after ${max_ms}ms"
          exit 1

      - name: Assert health HTTP 200
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18765/api/v1/health)
          if [ "$status" != "200" ]; then
            echo "Expected HTTP 200, got $status"
            exit 1
          fi
          echo "Health endpoint returned HTTP $status"

      - name: Assert health.version is not dev-build (audit F-A4)
        run: |
          # F-A4 (audit-e7618c9c, 2026-05-06): the original Scope A defect
          # was that `go build` without -ldflags produced a daemon reporting
          # version="dev". The smoke test asserted HTTP 200 but never the
          # version field, so the defect shipped uncaught for weeks.
          # runtime/debug.ReadBuildInfo() (commit 1b98785) now resolves a
          # real version from VCS info — assert that the daemon never
          # reports a bare "dev" again from a CI build.
          version=$(curl -s http://127.0.0.1:18765/api/v1/health | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$version" ]; then
            echo "FAIL: /health did not return a version field"
            exit 1
          fi
          if [ "$version" = "dev" ]; then
            echo "FAIL: daemon reports version=dev — runtime/debug.ReadBuildInfo() should have synthesised a VCS-derived version. CI runner missing .git or Go too old."
            exit 1
          fi
          echo "OK: daemon version=$version"

      - name: Graceful shutdown
        run: |
          kill -TERM "$PID"
          # Wait up to 5s for graceful exit (GNU tail --pid; ubuntu-latest only)
          timeout 5 tail --pid="$PID" -f /dev/null 2>/dev/null || true
          # Check if process exited
          if kill -0 "$PID" 2>/dev/null; then
            echo "Process did not exit after SIGTERM, sending SIGKILL"
            kill -KILL "$PID"
            wait "$PID" 2>/dev/null || true
            exit 1
          fi
          echo "Daemon exited gracefully"

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode/mcp-gateway-dashboard
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Lint catalog (ajv schema validation + cross-ref check)
        run: npm run lint:catalog

      - name: Verify catalog files + runtime deps are packaged in the VSIX
        # CA.7 acceptance + CA gate fix: docs/catalog/* must be reachable at
        # runtime via extensionPath/docs/catalog/, AND the ajv runtime
        # dependencies must survive the .vscodeignore filter (the project
        # excludes node_modules/** wholesale and re-includes only the catalog
        # loader's deps via negation entries). `vsce ls` enumerates exactly
        # what `vsce package` would include.
        run: |
          listing=$(npx -y @vscode/vsce ls 2>/dev/null)
          catalog_count=$(echo "$listing" | grep -c '^docs/catalog/' || true)
          if [ "$catalog_count" -ne 4 ]; then
            echo "Expected 4 docs/catalog/* files in VSIX, got $catalog_count"
            echo "$listing"
            exit 1
          fi
          for dep in ajv ajv-formats fast-deep-equal fast-uri json-schema-traverse require-from-string; do
            if ! echo "$listing" | grep -q "^node_modules/$dep/package.json$"; then
              echo "Runtime dependency '$dep' missing from VSIX (.vscodeignore negation entry needed)"
              exit 1
            fi
          done
          echo "VSIX contains $catalog_count docs/catalog/* files + 6 ajv runtime deps (OK)"

  # T14.2-3: gitleaks scans the full history of each PR / push for
  # accidentally committed secrets. Configuration lives in .gitleaks.toml
  # at the repo root; test fixtures that deliberately contain token-
  # shaped strings are allowlisted there.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required so gitleaks can scan the full history

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
