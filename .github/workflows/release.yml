# Triggered by release-please tags (v*) — release-please creates the tag
# after its release PR is merged, which triggers this workflow via GoReleaser.
name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # required for GitHub Release creation
      id-token: write      # required for Sigstore OIDC token (cosign keyless)
      attestations: write  # required for GitHub Attestation API
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "v2.8.2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: ./dist/checksums.txt
