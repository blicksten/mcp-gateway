# RTM — Requirements Traceability Matrix
# Anchored on ISO/IEC/IEEE 29148:2018
#
# Each entry binds a documented semantic claim about mcp-gateway to its
# implementation and the named scenario that proves it works.
#
# SCOPE: this file holds claims about mcp-gateway code ONLY. Cross-project
# claims (e.g. claude-team-control hooks) are tracked in those projects'
# own audit packets, per project isolation discipline (CLAUDE.md).
#
# Mechanical claims (endpoint exists, env var read, CLI subcommand registered)
# are NOT here — they are handled by scripts/03-doc-diff.ps1 via extraction.
#
# This file holds SEMANTIC claims — claims that cannot be mechanically
# extracted (e.g., "admin token gates this endpoint", "disk persistence
# survives daemon restart").
#
# Required fields per claim:
#   asserts             — one-sentence behavioral claim. MUST be testable via a scenario.
#   implementation_file — relative path. MUST exist (validated by 03-doc-diff).
#   implementation_line — line of declaration, or null with reason.
#   scenario_id         — scenario from inputs/scenarios.md that PROVES this claim.
#                          The scenario MUST include an assertion verifying the asserts text.
#   verification_status — proven | unproven | drifted | doc_lie | needs_audit
#   last_verified       — ISO date of last status update.
#
# Status semantics:
#   proven       — impl + scenario found AND scenario asserted the behavior in latest run
#   unproven     — impl found but no scenario covers it (must add scenario before claim is usable)
#   drifted      — was proven; latest scenario run shows behavior changed
#   doc_lie      — no implementation found at impl_file:impl_line
#   needs_audit  — added or modified since last_verified; must be re-checked this cycle

claims:
  - claim_id: MCPR.3-admin-token-gates-shutdown
    source_doc: docs/ADR-0007-two-tier-auth.md
    source_section: "Decision — three invariants"
    asserts: "POST /api/v1/shutdown with regular user-config Bearer returns HTTP 401 (scope=admin reason=mismatch); only the admin token from ~/.mcp-gateway/admin.token is accepted. The plugin manifest .mcp.json template substitutes only ${user_config.auth_token}, so VS Code's McpGatewayService cannot acquire the admin token."
    implementation_file: internal/auth/admin.go
    implementation_line: 39
    implementation_symbol: AdminMiddleware
    scenario_id: scn-shutdown-auth-rejection
    verification_status: needs_audit
    last_verified: null
    references:
      - "docs/ADR-0007-two-tier-auth.md"

