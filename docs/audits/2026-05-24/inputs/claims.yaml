    source_doc: docs/ADR-0007-two-tier-auth.md
    source_section: "Verification — Manual GATE MCPR.3 smoke"
    asserts: "Closing 3+ VS Code windows in succession does NOT kill the mcp-gateway daemon. Daemon PID and process StartTime remain identical across all close events; audit log shows McpGatewayService's shutdown attempts rejected at admin-scope gate."
    implementation_file: internal/auth/admin.go
    implementation_line: 39
    implementation_symbol: AdminMiddleware
    scenario_id: scn-vscode-close-cascade-no-daemon-death
    verification_status: needs_audit
    last_verified: null

